<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Cube Grid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            background: rgba(10, 10, 40, 0.7);
            backdrop-filter: blur(12px);
            padding: 14px 24px;
            border-radius: 16px;
            border: 1px solid rgba(100, 100, 255, 0.15);
        }

        #controls button {
            background: rgba(80, 80, 200, 0.2);
            color: #aaf;
            border: 1px solid rgba(100, 100, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        #controls button:hover {
            background: rgba(80, 80, 200, 0.5);
            color: #fff;
            border-color: rgba(100, 100, 255, 0.7);
            box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
        }

        #controls button.active {
            background: rgba(100, 100, 255, 0.4);
            color: #fff;
            border-color: rgba(150, 150, 255, 0.8);
        }

        #info {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(150, 160, 255, 0.6);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }

        #stats {
            position: fixed;
            top: 24px;
            left: 24px;
            color: rgba(150, 160, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="info">Neon Cube Grid</div>
    <div id="stats">
        Cubes: <span id="cubeCount">0</span><br>
        FPS: <span id="fps">0</span>
    </div>
    <div id="controls">
        <button id="btnWave" class="active">Wave</button>
        <button id="btnRain">Rain</button>
        <button id="btnPulse">Pulse</button>
        <button id="btnRandomize">Randomize</button>
        <button id="btnReset">Reset</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ─── CONFIG ─────────────────────────────────────────────
        const CONFIG = {
            gridCols: 14,
            gridRows: 14,
            cubeSize: 0.6,
            spacing: 1.2,
            bloomStrength: 1.4,
            bloomRadius: 0.6,
            bloomThreshold: 0.15,
            accentProbability: 0.04,
            waveSpeed: 1.8,
            waveAmplitude: 0.5,
        };

        const COLORS = {
            primary: new THREE.Color(0.25, 0.25, 0.7),
            primaryEdge: new THREE.Color(0.5, 0.5, 1.0),
            green: new THREE.Color(0.0, 0.9, 0.2),
            greenEdge: new THREE.Color(0.2, 1.0, 0.4),
            cyan: new THREE.Color(0.0, 0.8, 1.0),
            cyanEdge: new THREE.Color(0.2, 0.9, 1.0),
            magenta: new THREE.Color(1.0, 0.1, 0.7),
            magentaEdge: new THREE.Color(1.0, 0.3, 0.9),
            orange: new THREE.Color(1.0, 0.5, 0.0),
            orangeEdge: new THREE.Color(1.0, 0.7, 0.2),
            background: new THREE.Color(0.02, 0.02, 0.08),
        };

        // ─── SCENE SETUP ────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = COLORS.background;
        scene.fog = new THREE.FogExp2(0x050510, 0.025);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(12, 14, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ─── POST-PROCESSING ────────────────────────────────────
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            CONFIG.bloomStrength,
            CONFIG.bloomRadius,
            CONFIG.bloomThreshold
        );
        composer.addPass(bloomPass);

        // ─── CONTROLS ───────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 5;
        controls.maxDistance = 40;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.target.set(0, 0, 0);

        // ─── LIGHTING ───────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x111133, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x4444aa, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const pointLight1 = new THREE.PointLight(0x4444ff, 2, 30);
        pointLight1.position.set(-5, 5, -5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff44ff, 1.5, 25);
        pointLight2.position.set(5, 5, 5);
        scene.add(pointLight2);

        // ─── FLOOR / GRID ───────────────────────────────────────
        const gridHelper = new THREE.GridHelper(40, 40, 0x111144, 0x0a0a22);
        gridHelper.position.y = -0.6;
        scene.add(gridHelper);

        // Reflective floor
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x050515,
            metalness: 0.8,
            roughness: 0.2,
            transparent: true,
            opacity: 0.6,
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.6;
        floor.receiveShadow = true;
        scene.add(floor);

        // ─── CUBE CREATION ──────────────────────────────────────
        const cubes = [];
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        const boxGeometry = new THREE.BoxGeometry(
            CONFIG.cubeSize, CONFIG.cubeSize, CONFIG.cubeSize
        );

        // Pre-generate random accent colors
        const accentColors = [
            { body: COLORS.green, edge: COLORS.greenEdge },
            { body: COLORS.cyan, edge: COLORS.cyanEdge },
            { body: COLORS.magenta, edge: COLORS.magentaEdge },
            { body: COLORS.orange, edge: COLORS.orangeEdge },
        ];

        function createCubeMaterial(color, edgeColor, isAccent) {
            const bodyMat = new THREE.MeshPhysicalMaterial({
                color: color,
                transparent: true,
                opacity: isAccent ? 0.35 : 0.08,
                metalness: 0.3,
                roughness: 0.1,
                transmission: 0.5,
                thickness: 0.5,
                ior: 1.5,
                emissive: color,
                emissiveIntensity: isAccent ? 0.6 : 0.1,
            });

            return bodyMat;
        }

        function createCubeEdgeMaterial(edgeColor) {
            return new THREE.LineBasicMaterial({
                color: edgeColor,
                transparent: true,
                opacity: 0.9,
            });
        }

        const offsetX = -(CONFIG.gridCols * CONFIG.spacing) / 2 + CONFIG.spacing / 2;
        const offsetZ = -(CONFIG.gridRows * CONFIG.spacing) / 2 + CONFIG.spacing / 2;

        for (let row = 0; row < CONFIG.gridRows; row++) {
            for (let col = 0; col < CONFIG.gridCols; col++) {
                const isAccent = Math.random() < CONFIG.accentProbability;
                let bodyColor, edgeColor;

                if (isAccent) {
                    const accent = accentColors[Math.floor(Math.random() * accentColors.length)];
                    bodyColor = accent.body;
                    edgeColor = accent.edge;
                } else {
                    bodyColor = COLORS.primary.clone();
                    // Slight variation in blue
                    bodyColor.r += (Math.random() - 0.5) * 0.05;
                    bodyColor.b += (Math.random() - 0.5) * 0.1;
                    edgeColor = COLORS.primaryEdge.clone();
                }

                const bodyMat = createCubeMaterial(bodyColor, edgeColor, isAccent);
                const mesh = new THREE.Mesh(boxGeometry, bodyMat);

                // Edge wireframe
                const edgesGeo = new THREE.EdgesGeometry(boxGeometry);
                const edgeMat = createCubeEdgeMaterial(edgeColor);
                const edges = new THREE.LineSegments(edgesGeo, edgeMat);
                mesh.add(edges);

                const x = col * CONFIG.spacing + offsetX;
                const z = row * CONFIG.spacing + offsetZ;

                mesh.position.set(x, 0, z);
                mesh.castShadow = true;

                cubeGroup.add(mesh);

                cubes.push({
                    mesh,
                    edges,
                    bodyMat,
                    edgeMat,
                    baseX: x,
                    baseY: 0,
                    baseZ: z,
                    row,
                    col,
                    isAccent,
                    bodyColor,
                    edgeColor,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 0.5,
                    baseEmissive: isAccent ? 0.6 : 0.1,
                });
            }
        }

        document.getElementById('cubeCount').textContent = cubes.length;

        // ─── ANIMATION STATE ────────────────────────────────────
        let animationMode = 'wave';
        let time = 0;
        let pulsePhase = 0;
        const clock = new THREE.Clock();

        // ─── ANIMATION FUNCTIONS ────────────────────────────────
        function animateWave(t) {
            cubes.forEach(cube => {
                const dist = Math.sqrt(cube.baseX * cube.baseX + cube.baseZ * cube.baseZ);
                const wave = Math.sin(dist * 0.4 - t * CONFIG.waveSpeed + cube.phase) * CONFIG.waveAmplitude;
                cube.mesh.position.y = wave;

                // Subtle scale pulse
                const scale = 1 + Math.sin(dist * 0.3 - t * CONFIG.waveSpeed * 0.8) * 0.05;
                cube.mesh.scale.setScalar(scale);

                // Emissive pulse
                cube.bodyMat.emissiveIntensity = cube.baseEmissive + Math.sin(t * 2 + cube.phase) * 0.15;
            });
        }

        function animateRain(t) {
            cubes.forEach(cube => {
                const wave1 = Math.sin(cube.baseX * 0.5 + t * 3) * 0.3;
                const wave2 = Math.cos(cube.baseZ * 0.5 + t * 2.5) * 0.3;
                const wave3 = Math.sin((cube.baseX + cube.baseZ) * 0.3 - t * 2) * 0.2;
                cube.mesh.position.y = wave1 + wave2 + wave3;

                const scale = 1 + Math.sin(t * 1.5 + cube.col * 0.3) * 0.08;
                cube.mesh.scale.setScalar(scale);

                cube.bodyMat.emissiveIntensity = cube.baseEmissive + Math.sin(t * 3 + cube.row) * 0.2;
            });
        }

        function animatePulse(t) {
            pulsePhase += 0.02;
            const pulse = Math.sin(pulsePhase) * 0.5 + 0.5;

            cubes.forEach(cube => {
                const dist = Math.sqrt(cube.baseX * cube.baseX + cube.baseZ * cube.baseZ);
                const delay = dist * 0.15;
                const localPulse = Math.sin(pulsePhase - delay);

                cube.mesh.position.y = localPulse * 0.6;

                const scale = 1 + localPulse * 0.12;
                cube.mesh.scale.setScalar(scale);

                cube.bodyMat.emissiveIntensity = cube.baseEmissive * (1 + localPulse * 2);
                cube.edgeMat.opacity = 0.5 + localPulse * 0.5;
            });
        }

        // ─── BUTTON HANDLERS ────────────────────────────────────
        function setActiveButton(mode) {
            animationMode = mode;
            document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1))?.classList.add('active');
        }

        document.getElementById('btnWave').addEventListener('click', () => setActiveButton('wave'));
        document.getElementById('btnRain').addEventListener('click', () => setActiveButton('rain'));
        document.getElementById('btnPulse').addEventListener('click', () => setActiveButton('pulse'));

        document.getElementById('btnRandomize').addEventListener('click', () => {
            cubes.forEach(cube => {
                const isAccent = Math.random() < 0.15;
                if (isAccent) {
                    const accent = accentColors[Math.floor(Math.random() * accentColors.length)];
                    cube.bodyMat.color.copy(accent.body);
                    cube.bodyMat.emissive.copy(accent.body);
                    cube.bodyMat.opacity = 0.35;
                    cube.bodyMat.emissiveIntensity = 0.6;
                    cube.edgeMat.color.copy(accent.edge);
                } else {
                    cube.bodyMat.color.copy(COLORS.primary);
                    cube.bodyMat.emissive.copy(COLORS.primary);
                    cube.bodyMat.opacity = 0.08;
                    cube.bodyMat.emissiveIntensity = 0.1;
                    cube.edgeMat.color.copy(COLORS.primaryEdge);
                }
            });
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            cubes.forEach(cube => {
                const isAccent = Math.random() < CONFIG.accentProbability;
                let bodyColor, edgeColor;
                if (isAccent) {
                    const accent = accentColors[Math.floor(Math.random() * accentColors.length)];
                    bodyColor = accent.body;
                    edgeColor = accent.edge;
                } else {
                    bodyColor = COLORS.primary.clone();
                    edgeColor = COLORS.primaryEdge.clone();
                }
                cube.bodyMat.color.copy(bodyColor);
                cube.bodyMat.emissive.copy(bodyColor);
                cube.bodyMat.opacity = isAccent ? 0.35 : 0.08;
                cube.bodyMat.emissiveIntensity = isAccent ? 0.6 : 0.1;
                cube.edgeMat.color.copy(edgeColor);
                cube.mesh.position.y = 0;
                cube.mesh.scale.setScalar(1);
            });
            animationMode = 'wave';
            document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btnWave').classList.add('active');
        });

        // ─── FPS COUNTER ────────────────────────────────────────
        let frameCount = 0;
        let lastFpsTime = performance.now();

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }
        }

        // ─── RESIZE HANDLER ─────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── ANIMATION LOOP ─────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            time += delta;

            controls.update();

            // Run active animation
            switch (animationMode) {
                case 'wave':
                    animateWave(time);
                    break;
                case 'rain':
                    animateRain(time);
                    break;
                case 'pulse':
                    animatePulse(time);
                    break;
            }

            // Subtle point light movement
            pointLight1.position.x = Math.sin(time * 0.3) * 8;
            pointLight1.position.z = Math.cos(time * 0.3) * 8;
            pointLight2.position.x = Math.cos(time * 0.2) * 6;
            pointLight2.position.z = Math.sin(time * 0.2) * 6;

            composer.render();
            updateFPS();
        }

        animate();
    </script>
</body>
</html>
